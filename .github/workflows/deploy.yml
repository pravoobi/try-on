name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel one mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Models and test photos are gitignored (fetched binaries, not source —
      # unlike the garment PNGs/catalog, which are committed) — fetch them
      # before building, or the deployed site ships with no models.
      - run: npm run fetch-models
      # Test photos are Wikimedia-hosted and just back the "quick load" demo
      # buttons — not required for the app to function (upload/webcam still
      # work). Wikimedia rate-limits shared CI IPs (429s); don't fail the
      # whole deploy over a photo-fetch hiccup that the script already retries.
      - run: npm run fetch-test-photos
        continue-on-error: true

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
